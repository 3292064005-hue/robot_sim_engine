name: ci

on:
  push:
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  runtime_contracts:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Runtime contract gate
        run: python scripts/verify_runtime_contracts.py --mode headless --check-packaged-configs
      - name: Compatibility retirement plan
        run: python scripts/verify_compatibility_retirement.py
      - name: Compatibility budget
        run: python scripts/verify_compatibility_budget.py --scenario clean_headless_mainline
      - name: Performance budget config
        run: python scripts/verify_perf_budget_config.py
      - name: Performance smoke gate
        run: pytest tests/performance/test_ik_smoke.py -q
      - name: Quality contracts and shipped behavior contracts
        run: python scripts/verify_quality_contracts.py
      - name: Quick quality gate
        run: python scripts/verify_quick_quality.py
      - name: Importer fidelity baseline
        run: |
          python scripts/regenerate_importer_fidelity_baseline.py
          git diff --exit-code -- tests/regression/baselines/importer_fidelity_baseline.json
      - name: Contract docs stay regenerated
        run: |
          python scripts/regenerate_quality_contracts.py
          git diff --exit-code -- docs

  governance_evidence:
    runs-on: ubuntu-22.04
    needs: runtime_contracts
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[gui,dev]
      - name: Experimental module governance with evidence
        run: python scripts/verify_module_governance.py --execute-gates --evidence-out artifacts/module_governance_evidence.json
      - name: Benchmark verification matrix with evidence
        run: python scripts/verify_benchmark_matrix.py --execute-gates --execute --evidence-out artifacts/benchmark_matrix_evidence.json
      - name: Collect quality evidence artifact
        run: python scripts/collect_quality_evidence.py --out artifacts/quality_evidence.json --markdown-out artifacts/quality_evidence.md --release-manifest-out artifacts/release_manifest.json --merge artifacts/module_governance_evidence.json artifacts/benchmark_matrix_evidence.json runtime_contracts compatibility_budget performance_smoke
      - name: Upload quality evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: quality-evidence
          path: |
            artifacts/quality_evidence.json
            artifacts/quality_evidence.md

  unit_regression:
    runs-on: ubuntu-22.04
    needs: runtime_contracts
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        if: matrix.python-version == '3.10'
        run: mypy
      - name: Unit and regression tests
        run: pytest tests/unit tests/regression -q

  full_validation:
    runs-on: ubuntu-22.04
    needs: [runtime_contracts, unit_regression]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Tests with coverage gate
        run: pytest --cov=src/robot_sim --cov-report=term-missing --cov-report=json:coverage.json -q
      - name: Partition coverage gate
        run: python scripts/verify_partition_coverage.py --coverage-json coverage.json

  gui_smoke:
    runs-on: ubuntu-22.04
    needs: [runtime_contracts, governance_evidence]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[gui,dev]
      - name: GUI smoke gate
        run: python scripts/verify_gui_smoke.py
      - name: Real PySide6 GUI tests
        run: pytest tests/gui -q

  release_validation:
    runs-on: ubuntu-22.04
    needs: full_validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build
      - name: Validate packaged config staging
        run: python scripts/sync_packaged_configs.py --check
      - name: Build distribution artifacts
        run: python -m build
      - name: Release runtime baseline
        run: python scripts/verify_runtime_baseline.py --mode release
      - name: Release environment contract
        run: python scripts/verify_release_environment.py --mode release
      - name: Reinstall built wheel
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Smoke installed bootstrap/container
        run: |
          python -c "import robot_sim; import robot_sim.app.bootstrap; import robot_sim.app.version"
          python -c "from robot_sim.app.bootstrap import bootstrap; context = bootstrap(startup_mode='release'); assert context.container.runtime_context['config_root']; assert context.container.runtime_context['export_root']; assert context.container.runtime_context['robot_root']; assert context.container.runtime_context['startup_mode'] == 'release'; print(context.project_root); print(context.container.runtime_context['config_root']); print(context.container.runtime_context['robot_root'])"
      - name: Smoke installed robot import/save overlay
        run: python -m robot_sim.infra.installed_runtime_smoke
      - name: Release package validation
        run: pytest tests/test_release_package.py -q
      - name: Build clean source bundle
        run: python scripts/package_release.py --output dist/source-release.zip --top-level-dir robot_sim_engine
