plugins:
  - id: research_dls_solver
    kind: solver
    factory: robot_sim.plugins.research_dls_solver_plugin:build_plugin
    enabled_profiles: [research]
    source: shipped_plugin
    api_version: v1
    sdk_contract_version: v1
    min_host_version: 0.7.0
    required_host_capabilities: [profile:research, experimental_modules, plugin_status:experimental]
    status: experimental
    deployment_tier: experimental
    metadata:
      family: iterative
      display_name: Research DLS solver
      verification_scope: registry_smoke

  - id: research_cartesian_planner
    kind: planner
    factory: robot_sim.plugins.research_cartesian_planner_plugin:build_plugin
    enabled_profiles: [research]
    source: shipped_plugin
    api_version: v1
    sdk_contract_version: v1
    min_host_version: 0.7.0
    required_host_capabilities: [profile:research, experimental_modules, plugin_status:experimental]
    status: experimental
    deployment_tier: experimental
    metadata:
      family: cartesian
      display_name: Research Cartesian planner
      verification_scope: registry_smoke

  - id: research_yaml_importer
    kind: importer
    factory: robot_sim.plugins.research_yaml_importer_plugin:build_plugin
    enabled_profiles: [research]
    source: shipped_plugin
    api_version: v1
    sdk_contract_version: v1
    min_host_version: 0.7.0
    required_host_capabilities: [profile:research, experimental_modules, plugin_status:experimental]
    status: experimental
    deployment_tier: experimental
    metadata:
      family: config
      display_name: Research YAML importer
      source_format: yaml
      fidelity: native
      verification_scope: registry_smoke
