    scope: in_repo
    usage_kind: worker_signal_adapter
    status: deprecated
    evidence: src/robot_sim/presentation/threading/worker_binding.py
  - consumer_id: tests/unit/test_compatibility_usage_logging.py::test_worker_legacy_signal_adapter_records_usage
