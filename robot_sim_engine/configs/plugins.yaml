plugins:
# Alias-only shipped plugin: keep policy/audit surface, but resolve to builtin canonical capability.
- id: shipped_lm_solver
  kind: solver
  factory: robot_sim.plugins.shipped_lm_solver_plugin:build_plugin
  enabled_profiles:
  - default
  - dev
  - gui
  - ci
  - release
  source: shipped_plugin
  api_version: v1
  sdk_contract_version: v1
  min_host_version: 0.7.0
  required_host_capabilities:
  - plugin_status:stable
  status: stable
  deployment_tier: production
  metadata:
    family: iterative
    display_name: Shipped LM solver
    verification_scope: registry_smoke
    canonical_target: lm
