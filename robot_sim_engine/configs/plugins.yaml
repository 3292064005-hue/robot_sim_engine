plugins:
  - id: research_demo_dls
    kind: solver
    factory: robot_sim.plugins.research_demo_solver:build_plugin
    aliases: [research_demo]
    enabled_profiles: [research]
    source: shipped_plugin
    api_version: v1
    sdk_contract_version: v1
    min_host_version: 0.7.0
    required_host_capabilities: [profile:research, experimental_modules, plugin_status:experimental]
    status: experimental
    metadata:
      family: iterative
      display_name: Research demo DLS solver
      verification_scope: registry_smoke

  - id: research_demo_cartesian_planner
    kind: planner
    factory: robot_sim.plugins.research_demo_planner:build_plugin
    aliases: [research_cartesian]
    enabled_profiles: [research]
    source: shipped_plugin
    api_version: v1
    sdk_contract_version: v1
    min_host_version: 0.7.0
    required_host_capabilities: [profile:research, experimental_modules, plugin_status:experimental]
    status: experimental
    metadata:
      family: cartesian
      display_name: Research demo Cartesian planner
      verification_scope: registry_smoke

  - id: research_demo_yaml_importer
    kind: importer
    factory: robot_sim.plugins.research_demo_importer:build_plugin
    aliases: [research_yaml]
    enabled_profiles: [research]
    source: shipped_plugin
    api_version: v1
    sdk_contract_version: v1
    min_host_version: 0.7.0
    required_host_capabilities: [profile:research, experimental_modules, plugin_status:experimental]
    status: experimental
    metadata:
      family: config
      display_name: Research demo YAML importer
      source_format: yaml
      fidelity: native
      verification_scope: registry_smoke
