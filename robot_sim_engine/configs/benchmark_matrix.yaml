benchmark_matrix:
  matrix_id: v1
  runtime_surfaces:
    - headless_runtime
    - gui_offscreen
  importer_variants:
    - yaml_like
    - urdf_skeleton
    - urdf_model
  scene_variants:
    - clean_scene
    - obstacle_single_box
    - obstacle_dense
  solver_suites:
    - ik_planar_smoke
    - ik_planar_default_suite
    - trajectory_plan_smoke
  capture_modes:
    - snapshot_capture
    - live_capture_capability_probe
  required_quality_gates:
    - quick_quality
    - performance_smoke
    - gui_smoke
  required_pairs:
    - runtime_surface: headless_runtime
      importer_variant: yaml_like
      scene_variant: clean_scene
      solver_suite: ik_planar_smoke
      capture_mode: snapshot_capture
      execution_targets:
        - kind: pytest
          selector: tests/integration/test_ik_planar.py::test_dls_ik_planar_reachable
        - kind: pytest
          selector: tests/performance/test_ik_smoke.py::test_ik_smoke_produces_stable_elapsed_statistics
    - runtime_surface: headless_runtime
      importer_variant: urdf_skeleton
      scene_variant: obstacle_single_box
      solver_suite: ik_planar_default_suite
      capture_mode: snapshot_capture
      execution_targets:
        - kind: pytest
          selector: tests/unit/test_importer_fidelity_levels.py::test_yaml_and_urdf_importers_expose_fidelity
        - kind: pytest
          selector: tests/unit/test_scene_authority_service.py::test_scene_authority_service_applies_obstacle_and_allowed_pairs
    - runtime_surface: headless_runtime
      importer_variant: urdf_model
      scene_variant: obstacle_dense
      solver_suite: trajectory_plan_smoke
      capture_mode: snapshot_capture
      execution_targets:
        - kind: pytest
          selector: tests/integration/test_import_robot_into_scene_pipeline.py::test_imported_robot_bundle_can_seed_planning_scene
        - kind: pytest
          selector: tests/integration/test_trajectory_pipeline_lifecycle.py::test_trajectory_pipeline_runs_joint_quintic_end_to_end
    - runtime_surface: gui_offscreen
      importer_variant: urdf_model
      scene_variant: clean_scene
      solver_suite: ik_planar_smoke
      capture_mode: live_capture_capability_probe
      execution_targets:
        - kind: pytest
          selector: tests/unit/test_scene_render_contracts.py::test_scene_widget_snapshot_tracks_scene_fields
        - kind: pytest
          selector: tests/unit/test_scene_render_contracts.py::test_scene_widget_exposes_render_runtime_snapshot
