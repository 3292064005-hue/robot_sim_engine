benchmark_matrix:
  matrix_id: v1
  runtime_surfaces:
    - headless_runtime
    - gui_offscreen
  importer_variants:
    - yaml_like
    - urdf_skeleton
    - urdf_model
  scene_variants:
    - clean_scene
    - obstacle_single_box
    - obstacle_dense
  solver_suites:
    - ik_planar_smoke
    - ik_planar_default_suite
    - trajectory_plan_smoke
  capture_modes:
    - snapshot_capture
    - live_capture_capability_probe
  required_quality_gates:
    - quick_quality
    - performance_smoke
    - gui_smoke
  required_pairs:
    - runtime_surface: headless_runtime
      importer_variant: yaml_like
      scene_variant: clean_scene
      solver_suite: ik_planar_smoke
      capture_mode: snapshot_capture
      execution_targets:
        - kind: runtime_case
          selector: runtime_case:yaml_like.clean_scene.ik_planar_smoke.snapshot_capture
    - runtime_surface: headless_runtime
      importer_variant: urdf_skeleton
      scene_variant: obstacle_single_box
      solver_suite: ik_planar_default_suite
      capture_mode: snapshot_capture
      execution_targets:
        - kind: runtime_case
          selector: runtime_case:urdf_skeleton.obstacle_single_box.ik_planar_default_suite.snapshot_capture
    - runtime_surface: headless_runtime
      importer_variant: urdf_model
      scene_variant: obstacle_dense
      solver_suite: trajectory_plan_smoke
      capture_mode: snapshot_capture
      execution_targets:
        - kind: runtime_case
          selector: runtime_case:urdf_model.obstacle_dense.trajectory_plan_smoke.snapshot_capture
    - runtime_surface: gui_offscreen
      importer_variant: urdf_model
      scene_variant: clean_scene
      solver_suite: ik_planar_smoke
      capture_mode: live_capture_capability_probe
      execution_targets:
        - kind: runtime_case
          selector: runtime_case:gui_offscreen.urdf_model.clean_scene.live_capture_capability_probe
          execution_environment: gui
